variables:
  DOCKER_IMAGE_TAG: $CI_PIPELINE_IID
  DOCKER_IMAGE_NAME: $CI_REGISTRY_IMAGE/$CI_COMMIT_REF_SLUG

stages:
  - build
  - release

build:image:dev:
  stage: build
  tags:
    - shell-build-runer
  rules:
    - if: $CI_COMMIT_TAG
      when: on_success
  script:
    - docker build -t $DOCKER_IMAGE_NAME:$DOCKER_IMAGE_TAG .
    - docker create --name temp_container $DOCKER_IMAGE_NAME:$DOCKER_IMAGE_TAG
    - docker cp temp_container:/output .
    - docker rm temp_container
    - echo $CI_API_V4_URL
    - echo $CI_PROJECT_ID
    - echo $CI_COMMIT_TAG
    - curl --header "PRIVATE-TOKEN: $CI_ACCESS_TOKEN" --upload-file ./output/picker-linux-amd64 "https://git.pepemoss.com/api/v4/projects/${CI_PROJECT_ID}/packages/generic/release/$CI_COMMIT_TAG/picker-linux-amd64"

