variables:
  DOCKER_IMAGE_TAG: $CI_PIPELINE_IID
  DOCKER_IMAGE_NAME: $CI_REGISTRY_IMAGE/$CI_COMMIT_REF_SLUG

stages:
  - build
  - release

build:image:dev:
  stage: build
  tags:
    - shell-build-runer
  rules:
    - if: $CI_COMMIT_REF_NAME == "dev" && $CI_PIPELINE_SOURCE != "merge_request_event"
      when: on_success
    - when: never
  script:
    - docker build -t $DOCKER_IMAGE_NAME:$DOCKER_IMAGE_TAG .
    - docker create --name temp_container $DOCKER_IMAGE_NAME:$DOCKER_IMAGE_TAG
    - docker cp temp_container:/output .
    - docker rm temp_container
  artifacts:
    paths:
      - output/
    expire_in: 1 week

release:
  stage: release
  tags:
    - shell-build-runer
  rules:
    - if: $CI_COMMIT_TAG # Выполняется только для тэгов
      when: on_success
  script:
    - echo "Creating release for $CI_COMMIT_TAG"
    - >
      curl --header "PRIVATE-TOKEN: $GITLAB_ACCESS_TOKEN" \
      --data "name=$CI_COMMIT_TAG&tag_name=$CI_COMMIT_TAG&description=Release of $CI_COMMIT_TAG" \
      --data "assets[links][][name]=Source Code (.tar)" \
      --data "assets[links][][url]=https://git.gitlab.com/$CI_PROJECT_NAMESPACE/$CI_PROJECT_NAME/-/archive/$CI_COMMIT_TAG/$CI_PROJECT_NAME-$CI_COMMIT_TAG.tar" \
      "$CI_API_V4_URL/projects/$CI_PROJECT_ID/releases"

